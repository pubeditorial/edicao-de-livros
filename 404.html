<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="theme-color" content="#0a1222" />
  <meta name="robots" content="noindex,follow" />
  <title>Página não encontrada | PUB Editorial</title>
  <style>
    :root{
      --bg:#f8fafc;
      --fg:#0f172a;
      --muted:#475569;
      --blue:#2563eb;
      --violet:#7c3aed;
      --line:#e2e8f0;
    }

    *{box-sizing:border-box}
    html,body{margin:0;padding:0;min-height:100%}

    body{
      font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      background:
        radial-gradient(900px 280px at 10% 0%, rgba(37,99,235,.05), transparent 60%),
        radial-gradient(900px 280px at 90% 0%, rgba(124,58,237,.05), transparent 60%),
        var(--bg);
      color:var(--fg);
      display:grid;
      place-items:center;
      padding:24px;
    }

    .box{
      width:min(720px,100%);
      background:rgba(255,255,255,.92);
      border:1px solid var(--line);
      border-radius:28px;
      padding:32px;
      box-shadow:0 20px 60px rgba(15,23,42,.08);
    }

    .tag{
      display:inline-flex;
      align-items:center;
      gap:8px;
      font-size:11px;
      font-weight:900;
      letter-spacing:.10em;
      text-transform:uppercase;
      color:#1d4ed8;
      margin-bottom:14px;
    }

    .tag::before{
      content:"";
      width:10px;
      height:10px;
      border-radius:4px;
      background:linear-gradient(135deg, rgba(37,99,235,.90), rgba(124,58,237,.85));
    }

    h1{
      margin:0 0 12px;
      font-size:clamp(32px,4vw,52px);
      line-height:1;
      letter-spacing:-.04em;
    }

    p{
      margin:0 0 18px;
      color:var(--muted);
      font-size:16px;
      line-height:1.75;
    }

    .actions{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      margin-top:22px;
    }

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:50px;
      padding:12px 18px;
      border-radius:16px;
      font-weight:900;
      text-decoration:none;
      border:1px solid transparent;
    }

    .btn-primary{
      background:linear-gradient(135deg,#2563eb 0%,#3b82f6 58%,#60a5fa 100%);
      color:#fff;
      box-shadow:0 14px 34px rgba(37,99,235,.24);
    }

    .btn-secondary{
      background:#fff;
      color:var(--fg);
      border-color:var(--line);
    }
  </style>
</head>
<body>
  <main class="box">
    <div class="tag">PUB Editorial</div>
    <h1>Página não encontrada</h1>
    <p>
      O endereço que você tentou abrir não existe ou foi movido.
      Volte para a página principal da PUB Editorial.
    </p>

    <div class="actions">
      <a class="btn btn-primary" href="/">Ir para a página inicial</a>
      <a class="btn btn-secondary" href="https://instagram.com/pubeditorial" target="_blank" rel="noopener noreferrer">Instagram</a>
    </div>
  </main>
</body>
</html>
